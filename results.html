<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matched Names - Ink and Roses</title>
    <meta
      name="description"
      content="Matched names in the Ink and Roses anonymous confession registry."
    />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260626-1" />
  </head>
  <body class="paper-page">
    <div class="petal-field" aria-hidden="true"></div>

    <main class="paper-screen">
      <section class="page-shell" aria-labelledby="resultsTitle">
        <div class="page-heading">
          <p class="eyebrow dark">Matched names</p>
          <h1 id="resultsTitle">Sealed Papers Found in the Candlelit Registry</h1>
          <p id="resultSummary" class="page-subtitle">
            Search from the home page to reveal matching names.
          </p>
        </div>

        <form class="inline-search" action="/results" method="get" aria-label="Search again">
          <input
            id="searchName"
            name="q"
            type="search"
            autocomplete="off"
            maxlength="80"
            required
            placeholder="Search another name"
          />
          <button class="button primary" type="submit">
            <i data-lucide="search"></i>
            <span>Search</span>
          </button>
        </form>

        <div class="search-results" id="searchResults" aria-live="polite">
          <p class="empty-state">No name has been searched yet.</p>
        </div>

        <nav class="results-pagination" id="resultsPagination" aria-label="Search result pages" hidden>
          <button class="button pagination-button" type="button" id="previousResults">
            <i data-lucide="arrow-left"></i>
            <span>Previous</span>
          </button>
          <span class="pagination-page" id="resultPage">Page 1</span>
          <button class="button pagination-button" type="button" id="nextResults">
            <span>Next</span>
            <i data-lucide="arrow-right"></i>
          </button>
        </nav>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/firebase-config.js?v=20260626-2"></script>
    <script type="module" src="/script.js?v=20260626-2"></script>
  </body>
</html>
