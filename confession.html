<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opened Letter - Ink and Roses</title>
    <meta
      name="description"
      content="Open a sealed anonymous confession letter and view its sketch."
    />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260626-1" />
  </head>
  <body class="paper-page">
    <div class="petal-field" aria-hidden="true"></div>

    <main class="paper-screen">
      <section class="page-shell letter-page" aria-labelledby="letterTitle">
        <div class="letter-intro">
          <p class="eyebrow dark">A sealed paper confession</p>
          <h1 id="letterTitle">Click the Paper to Fade Into the Message</h1>
          <p class="page-subtitle">
            The seal fades away to reveal the confession with the sketch
            sent beside it.
          </p>
        </div>

        <div
          class="letter-stage"
          id="letterStage"
          role="button"
          tabindex="0"
          aria-label="Open selected paper confession"
        >
          <div class="letter-cover" aria-hidden="true">
            <span id="letterSealName">Ink and Roses</span>
          </div>
          <article class="sealed-card paper-letter" id="sealedCard">
            <div class="sealed-copy">
              <p class="sealed-to">To the moonlit dream</p>
              <p class="sealed-message">
                The paper waits for a name from the registry.
              </p>
            </div>
            <img
              id="sealedSketch"
              src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 420 520'%3E%3Crect width='420' height='520' fill='%23fffaf0'/%3E%3C/svg%3E"
              alt="The sketch attached to the anonymous confession."
            />
          </article>
        </div>

        <div class="letter-actions" aria-label="Letter actions">
          <button class="tool-button" type="button" id="copyConfession">
            <i data-lucide="copy"></i>
            <span>Copy text</span>
          </button>
          <button class="tool-button" type="button" id="downloadConfession">
            <i data-lucide="image-down"></i>
            <span>Download card</span>
          </button>
        </div>
        <p class="detail-response" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="firebase-config.js?v=20260626-2"></script>
    <script type="module" src="script.js?v=20260626-2"></script>
  </body>
</html>
